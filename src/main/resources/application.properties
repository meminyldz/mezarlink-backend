spring.application.name=mezarlink-backend

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mezarlink}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate
# update: gelistirme asamasinda semayi otomatik senkronlar.
# Production'a gecince bunu "validate" yapip Flyway/Liquibase ile migration yonetmek gerekir.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dosya yukleme limiti (kapak + galeri fotograflari icin)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# Cloudflare R2 (S3 uyumlu)
r2.endpoint=${R2_ENDPOINT:}
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.bucket=${R2_BUCKET:mezarlink-media}
r2.public-base-url=${R2_PUBLIC_BASE_URL:}

# Frontend origin (CORS icin)
app.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}

server.port=${PORT:8080}
